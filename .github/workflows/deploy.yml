name: Deploy Portfolio
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Inject API Key
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Before:"
          grep -o "ANTHROPIC_KEY" index.html | wc -l
          sed -i "s/ANTHROPIC_KEY/${API_KEY}/g" index.html
          echo "After:"
          grep -o "ANTHROPIC_KEY" index.html | wc -l
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
